DESC_TEXTINPUT="Einfaches einzeiliges Texteingabefeld. jQuery Mobile stylt es automatisch auf Touch-Groesse."
DESC_BUTTON="Ein Link oder Submit-Input wird per <code>data-role='button'</code> zum Button. <code>data-inline='true'</code> verhindert die Vollbreite, <code>data-icon</code> setzt ein Icon."
DESC_CHECKBOX="Checkbox in einem <code>fieldset</code> mit <code>data-role='controlgroup'</code>. Das <code>label</code> muss per <code>for</code>-Attribut auf die Input-ID zeigen — jQM versteckt den nativen Input und stylt das Label."
DESC_RADIO_V="Mehrere Radio-Inputs in einer <code>controlgroup</code> — standardmaessig vertikal gestapelt. Nur ein Wert der Gruppe kann gleichzeitig ausgewaehlt sein."
DESC_RADIO_H="Dieselbe Controlgroup mit <code>data-type='horizontal'</code> stellt die Optionen in einer Reihe dar — gut fuer wenige, kurze Beschriftungen."
DESC_CONTROLGROUP="Verbindet Buttons oder Inputs visuell zu einer Leiste. <code>data-type='horizontal'</code> reiht die Elemente nebeneinander; erster und letzter Button erhalten abgerundete Ecken."
DESC_FLIPSWITCH="Eine Checkbox als Ein/Aus-Kippschalter. <code>data-role='flipswitch'</code> am Input genuegt; alternativ ein <code>&lt;select&gt;</code> mit zwei Optionen fuer eigene Beschriftungen."
DESC_RANGESLIDER="Zwei Range-Inputs in <code>data-role='rangeslider'</code> definieren Unter- und Obergrenze. Beide muessen dieselben <code>min</code>/<code>max</code>-Werte teilen."
DESC_SELECTMENU="Ein normales <code>&lt;select&gt;</code> wird automatisch von jQuery Mobile zu einem gestylten Dropdown-Button umgewandelt — kein zusaetzliches Attribut noetig."
DESC_SLIDER="Einhaendiger Schieberegler aus <code>&lt;input type='range'&gt;</code>. <code>data-highlight='true'</code> fuellt die Spur vom linken Rand bis zum Griff."
DESC_FILTERABLE="Ein Suchfeld mit <code>data-type='search'</code> filtert eine Listview in Echtzeit. Das <code>data-input</code>-Attribut der Liste verknuepft sie mit dem Suchfeld."
DESC_COLLAPSIBLE="Ein <code>collapsibleset</code> gruppiert mehrere <code>collapsible</code>-Bloecke zu einem Akkordeon — nur ein Abschnitt ist gleichzeitig geoeffnet."
DESC_POPUP="Ein Link mit <code>data-rel='popup'</code> oeffnet einen Overlay-Dialog. Das Ziel-<code>div</code> mit <code>data-role='popup'</code> kann Header, Inhalt und Schliessen-Button enthalten."
