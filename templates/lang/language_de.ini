INTRO_LINE1_DS="Diese Seite zeigt die Verwendung von Perl und dem LoxBerry Design System (LoxBerry DS)."
DESC_TEXTINPUT_DS="Einzeiliges Texteingabefeld mit der Klasse <code>lb-input</code>. Es wird in einer <code>lb-form-row</code> mit <code>lb-form-label</code> und <code>lb-form-field</code> strukturiert."
DESC_BUTTON_DS="LoxBerry DS Buttons erhalten die Klasse <code>lb-btn</code>. Varianten: <code>lb-btn-primary</code> (Haupt-Aktion), <code>lb-btn-sm</code> (klein), <code>lb-btn-danger</code> (Loeschen/Warnung)."
DESC_CHECKBOX_DS="Nativer <code>&lt;input type='checkbox'&gt;</code> in einer <code>lb-form-row</code>. Das Label referenziert den Input per <code>for</code>-Attribut. Das LoxBerry DS stylt die Checkbox automatisch."
DESC_RADIO_V_DS="Native Radio-Inputs werden vertikal gestapelt, indem mehrere Input-Label-Paare in einem <code>lb-form-field</code> untereinander platziert werden. Alle Inputs derselben Gruppe teilen denselben <code>name</code>."
DESC_SELECTMENU_DS="Ein <code>&lt;select&gt;</code> mit der Klasse <code>lb-select</code> wird im LoxBerry DS Stil dargestellt. Kein zusaetzliches Widget noetig."
DESC_COLLAPSIBLE_DS="Das native HTML <code>&lt;details class='lb-collapsible'&gt;</code> mit einem <code>&lt;summary&gt;</code> erzeugt ein ausklappbares Panel. Das Attribut <code>open</code> oeffnet den Block standardmaessig. Inhalt kommt in <code>lb-collapsible-content</code>."
H_TOGGLE="Toggle (Ein/Aus-Schalter)"
DESC_TOGGLE="Ein Kippschalter aus <code>label.lb-toggle</code> mit innenliegender Checkbox. Das <code>span.lb-toggle-slider</code> erzeugt die Gleit-Animation. Aequivalent zum jQuery Mobile <code>flipswitch</code>."
H_BTNGROUP="Radio-Buttons (horizontal)"
DESC_BTNGROUP="<code>lb-btn-group</code> reiht Radio-Inputs mit Labels nebeneinander — aequivalent zu jQM <code>controlgroup data-type='horizontal'</code>. Nur ein Element kann gleichzeitig aktiv sein."
H_TEXTAREA="Textarea"
DESC_TEXTAREA="Mehrzeiliges Texteingabefeld mit der Klasse <code>lb-textarea</code>. Wird wie <code>lb-input</code> in einer <code>lb-form-row</code> strukturiert."
LBL_TEXTAREA="Notizen:"
PH_TEXTAREA="Mehrzeiligen Text eingeben..."
H_SLIDER_NATIVE="Slider (nativ)"
DESC_SLIDER_NATIVE="Nativer <code>&lt;input type='range'&gt;</code> mit der Klasse <code>lb-slider</code> fuer grünes LoxBerry DS Styling und animierten Thumb. In <code>lb-slider-wrap</code> kombiniert mit <code>lb-slider-value</code> zeigt ein Badge den aktuellen Wert an. Die befuellte Spur wird per CSS-Variable <code>--lb-slider-fill</code> gesteuert und per JavaScript aktuell gehalten."
H_CARD="Card"
DESC_CARD="<code>lb-card</code> hebt Inhalte mit Rahmen und leichtem Schatten optisch hervor — geeignet fuer Hinweise, Zusammenfassungen oder Informationsgruppen."
H_TABLE="Tabelle"
DESC_TABLE="Eine <code>&lt;table class='lb-table'&gt;</code> wird automatisch im LoxBerry DS Stil formatiert — mit klaren Trennlinien und Zeilenhervorhebung."
H_MODAL="Modal"
DESC_MODAL="Das native HTML <code>&lt;dialog class='lb-modal'&gt;</code> wird per <code>element.showModal()</code> geoeffnet und blockiert den Hintergrund. Mit <code>element.close()</code> wird er wieder geschlossen."
BTN_OPEN_MODAL="Modal oeffnen"
MODAL_TITLE="Modal-Titel"
MODAL_TEXT="Dies ist ein LoxBerry DS Modal-Dialog. Er blockiert die Interaktion mit dem Hintergrund bis er geschlossen wird."
DEMO_SECTION_A_TEXT_DS="Inhalt von Abschnitt A. Dieser Abschnitt ist standardmaessig geoeffnet (HTML-Attribut <code>open</code>)."
H_DS_MISSING="Nicht im LoxBerry DS enthalten"
DS_MISSING_RANGESLIDER="<b>Rangeslider:</b> jQuery Mobile bietet einen Dual-Handle-Slider (zwei Range-Inputs in <code>data-role='rangeslider'</code>). Im LoxBerry DS kein entsprechendes Widget vorhanden — Workaround: zwei separate native Range-Inputs verwenden."
DS_MISSING_FILTERABLE="<b>Filterable:</b> jQuery Mobile blendet Listeneintraege per Suchfeld in Echtzeit aus (<code>data-filter='true'</code>). Im LoxBerry DS nicht enthalten — kann mit nativem JavaScript nachgebaut werden."
