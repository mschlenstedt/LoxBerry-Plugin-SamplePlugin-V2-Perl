DESC_TEXTINPUT="Simple single-line text input. jQuery Mobile automatically styles it for touch."
DESC_BUTTON="A link or submit element becomes a button via <code>data-role='button'</code>. <code>data-inline='true'</code> prevents full width, <code>data-icon</code> sets an icon."
DESC_CHECKBOX="Checkbox inside a <code>fieldset</code> with <code>data-role='controlgroup'</code>. The <code>label</code> must reference the input via <code>for</code> — jQM hides the native input and styles the label."
DESC_RADIO_V="Multiple radio inputs in a <code>controlgroup</code> — stacked vertically by default. Only one value can be selected at a time."
DESC_RADIO_H="The same controlgroup with <code>data-type='horizontal'</code> places the options in a row — ideal for few, short labels."
DESC_CONTROLGROUP="Visually groups buttons or inputs into a bar. <code>data-type='horizontal'</code> places elements side by side; first and last button get rounded corners."
DESC_FLIPSWITCH="A checkbox as an on/off toggle. <code>data-role='flipswitch'</code> on the input is enough; alternatively use a <code>&lt;select&gt;</code> with two options for custom labels."
DESC_RANGESLIDER="Two range inputs in <code>data-role='rangeslider'</code> define lower and upper bounds. Both must share the same <code>min</code>/<code>max</code> values."
DESC_SELECTMENU="A standard <code>&lt;select&gt;</code> is automatically styled by jQuery Mobile into a dropdown button — no extra attribute needed."
DESC_SLIDER="Single-handle slider using <code>&lt;input type='range'&gt;</code>. <code>data-highlight='true'</code> fills the track up to the handle."
DESC_FILTERABLE="A search field with <code>data-type='search'</code> filters a listview in real time. The <code>data-input</code> attribute links the list to the search field."
DESC_COLLAPSIBLE="A <code>collapsibleset</code> groups multiple <code>collapsible</code> blocks into an accordion — only one section open at a time."
DESC_POPUP="A link with <code>data-rel='popup'</code> opens an overlay dialog. The target <code>div</code> with <code>data-role='popup'</code> can contain a header, content and close button."
