INTRO_LINE1_DS="This page demonstrates the use of Perl and the LoxBerry Design System (LoxBerry DS)."
DESC_TEXTINPUT_DS="Single-line text input with the <code>lb-input</code> class. Structured inside an <code>lb-form-row</code> with <code>lb-form-label</code> and <code>lb-form-field</code>."
DESC_BUTTON_DS="LoxBerry DS buttons use the <code>lb-btn</code> class. Variants: <code>lb-btn-primary</code> (primary action), <code>lb-btn-sm</code> (small), <code>lb-btn-danger</code> (delete/warning)."
DESC_CHECKBOX_DS="Native <code>&lt;input type='checkbox'&gt;</code> inside an <code>lb-form-row</code>. The label references the input via the <code>for</code> attribute. LoxBerry DS styles the checkbox automatically."
DESC_RADIO_V_DS="Native radio inputs are stacked vertically by placing multiple input-label pairs inside an <code>lb-form-field</code>. All inputs of the same group share the same <code>name</code>."
DESC_SELECTMENU_DS="A <code>&lt;select&gt;</code> with the class <code>lb-select</code> is displayed in LoxBerry DS style. No additional widget needed."
DESC_COLLAPSIBLE_DS="The native HTML <code>&lt;details class='lb-collapsible'&gt;</code> with a <code>&lt;summary&gt;</code> creates a collapsible panel. The <code>open</code> attribute expands it by default. Content goes inside <code>lb-collapsible-content</code>."
H_TOGGLE="Toggle (On/Off Switch)"
DESC_TOGGLE="An on/off switch built from <code>label.lb-toggle</code> containing a checkbox. The <code>span.lb-toggle-slider</code> creates the slide animation. Equivalent to jQuery Mobile's <code>flipswitch</code>."
H_BTNGROUP="Radio Buttons (horizontal)"
DESC_BTNGROUP="<code>lb-btn-group</code> places radio inputs with labels side by side — equivalent to jQM <code>controlgroup data-type='horizontal'</code>. Only one element can be active at a time."
H_TEXTAREA="Textarea"
DESC_TEXTAREA="Multi-line text input with the class <code>lb-textarea</code>. Structured the same as <code>lb-input</code> inside an <code>lb-form-row</code>."
LBL_TEXTAREA="Notes:"
PH_TEXTAREA="Enter multi-line text..."
H_SLIDER_NATIVE="Slider (native)"
DESC_SLIDER_NATIVE="Native <code>&lt;input type='range'&gt;</code> inside an <code>lb-form-row</code>. LoxBerry DS styles the slider track automatically. No additional widget required."
H_CARD="Card"
DESC_CARD="<code>lb-card</code> visually highlights content with a border and subtle shadow — ideal for hints, summaries, or information groups."
H_TABLE="Table"
DESC_TABLE="A <code>&lt;table class='lb-table'&gt;</code> is automatically formatted in LoxBerry DS style — with clear dividers and row highlighting."
H_MODAL="Modal"
DESC_MODAL="The native HTML <code>&lt;dialog class='lb-modal'&gt;</code> is opened with <code>element.showModal()</code> and blocks the background. Close it with <code>element.close()</code>."
BTN_OPEN_MODAL="Open Modal"
MODAL_TITLE="Modal Title"
MODAL_TEXT="This is a LoxBerry DS modal dialog. It blocks interaction with the background until it is closed."
DEMO_SECTION_A_TEXT_DS="Content of section A. This section is open by default (HTML attribute <code>open</code>)."
H_DS_MISSING="Not Available in LoxBerry DS"
DS_MISSING_RANGESLIDER="<b>Rangeslider:</b> jQuery Mobile provides a dual-handle slider (two range inputs inside <code>data-role='rangeslider'</code>). No equivalent widget in LoxBerry DS — use two separate native range inputs as a workaround."
DS_MISSING_FILTERABLE="<b>Filterable:</b> jQuery Mobile hides list entries via a search field in real time (<code>data-filter='true'</code>). Not included in LoxBerry DS — can be replicated with native JavaScript."

