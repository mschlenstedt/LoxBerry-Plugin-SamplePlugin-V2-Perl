; config/pluginconfig.cfg - Default configuration file for the Sample Plugin.
;
; This file is copied to $LBPCONFIG/<folder>/pluginconfig.cfg during installation.
; On updates, this file is NOT overwritten - the existing user config is preserved.
; Use preupgrade.sh / postupgrade.sh if you need to migrate config values.
;
; The format used here is Config::Simple (Perl) / parse_ini_file (PHP) compatible.
; Sections are denoted by [SECTION], key=value pairs, semicolons start comments.
;
; LoxBerry automatically replaces certain placeholder strings in this file
; during installation. This allows you to embed paths without hardcoding them:
;
;   REPLACELBPPLUGINDIR   -> actual plugin folder name (e.g. sampleplugin_folder01)
;   REPLACELBPCGIDIR      -> full path to plugin's cgi directory
;   REPLACELBPHTMLDIR     -> full path to plugin's html directory
;   REPLACELBPTEMPLATEDIR -> full path to plugin's template directory
;   REPLACELBPDATADIR     -> full path to plugin's data directory
;   REPLACELBPCONFIGDIR   -> full path to plugin's config directory
;   REPLACELBPLOGDIR      -> full path to plugin's log directory
;   REPLACELBPBINDIR      -> full path to plugin's bin directory
;   REPLACELBPSBINDIR     -> full path to plugin's sbin directory

[MAIN]
; The actual plugin folder name - filled in automatically during installation.
; Use this at runtime to build paths if needed.
SUBFOLDER=REPLACELBPPLUGINDIR

; A sample boolean option. Use LoxBerry's is_enabled() function to read it
; reliably (handles true/false/yes/no/on/off/1/0).
SOMEOTHEROPTION=0

[SECTION1]
NAME="This is a Name from the first Section"
ID="10"

[SECTION2]
NAME="This is a Name from the second Section"
ID="20"

[SECTION3]
NAME="This is a Name from the third Section"
ID="30"
