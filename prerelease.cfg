[AUTOUPDATE]
# prerelease.cfg - Pre-release configuration for automatic updates.
#
# Host this file at the URL specified as PRERELEASECFG in plugin.cfg.
# LoxBerry checks this file only when the user has opted into pre-release updates.
# Same format as release.cfg - update it when you publish a pre-release build.

# Version of the new pre-release
VERSION=1.0.0

# Direct download URL of the plugin ZIP archive for this pre-release
ARCHIVEURL=https://github.com/mschlenstedt/LoxBerry-Plugin-SamplePlugin-V2-Perl/archive/prerelease_1.0.0.zip

# URL to a page with release notes / changelog for this pre-release
INFOURL=https://github.com/mschlenstedt/LoxBerry-Plugin-SamplePlugin-V2-Perl/commits
