# plugin.cfg - Central configuration file for a LoxBerry plugin
# This file is mandatory and must be present in the root of the plugin ZIP archive.
# It uses INI-style syntax: sections in [BRACKETS], key=value pairs, # for comments.
# The file must be saved in Unix format (line ending: LF, not CRLF).

# =============================================================================
[AUTHOR]
# =============================================================================
# Identifies the plugin author or team. NEVER change NAME or EMAIL after the
# first release - LoxBerry uses these values to identify your plugin across
# updates. Changing them will cause update detection to fail and the plugin
# will be treated as a new, different plugin.
NAME=Max Mustermann
EMAIL=info@yourdomain.de

# =============================================================================
[PLUGIN]
# =============================================================================
# VERSION: The version of this plugin release. Use semantic versioning (MAJOR.MINOR.PATCH).
# See https://wiki.loxberry.de for supported version syntax.
VERSION=1.0.0

# NAME: Short technical name used for script filenames in daemon/ and cron/.
# Use lowercase only, no spaces. NEVER change after first release.
NAME=sampleplugin_name

# FOLDER: The preferred installation subfolder name. Lowercase, no spaces.
# If this name already exists on the system, LoxBerry will append 01, 02, etc.
# Your scripts must read the actual folder from /data/system/plugindatabase.dat
# at runtime, not hardcode this value. NEVER change after first release.
FOLDER=sampleplugin_folder

# TITLE: Human-readable display name of the plugin. Max 25 characters.
# Longer names will be truncated with "..." in the UI.
TITLE=Sample Plugin

# WEBSITE: URL of the plugin homepage or developer website (optional).
# Shown in the Plugin Management widget as a link.
WEBSITE=https://www.yourdomain.de

# =============================================================================
[AUTOUPDATE]
# =============================================================================
# AUTOMATIC_UPDATES: Set to true if you want to provide automatic updates via
# LoxBerry's built-in update mechanism. Set to false to disable this feature.
# More info: https://wiki.loxberry.de/entwickler/plugin_fur_den_loxberry_entwickeln_ab_version_1x/plugin_autoupdate_function_for_plugins
AUTOMATIC_UPDATES=true

# RELEASECFG: URL to your release.cfg file. This file is checked for new stable
# releases when the user enables automatic updates. If the VERSION in the remote
# release.cfg is newer than the installed version, LoxBerry will offer or
# automatically install the update from the URL given in release.cfg.
RELEASECFG=https://raw.githubusercontent.com/mschlenstedt/LoxBerry-Plugin-SamplePlugin-V2-Perl/master/release.cfg

# PRERELEASECFG: URL to your prerelease.cfg file. Checked only when the user
# has enabled pre-release updates. Same format as RELEASECFG.
PRERELEASECFG=https://raw.githubusercontent.com/mschlenstedt/LoxBerry-Plugin-SamplePlugin-V2-Perl/master/prerelease.cfg

# =============================================================================
[SYSTEM]
# =============================================================================
# REBOOT: If true, the user will be prompted to reboot LoxBerry after
# installation. Only set this to true if a reboot is genuinely required
# (e.g. new kernel module or system service). Possible values: true / false
REBOOT=false

# LB_MINIMUM: Minimum LoxBerry version required to run this plugin.
# Use a version string like "1.0.0". Set to false if there is no minimum.
# If you use Plugin Interface 2.0 features, set this to at least "1.0.0".
LB_MINIMUM=1.0.0

# LB_MAXIMUM: Maximum LoxBerry version this plugin is compatible with.
# Set to false if compatible with all future versions (recommended).
LB_MAXIMUM=false

# ARCHITECTURE: Restrict installation to specific hardware architectures.
# Separate multiple values with a comma. Set to false for any architecture.
# Always put values in double quotes. Common values: raspberry, x86, docker
# See https://github.com/MichaIng/DietPi/blob/master/dietpi/func/dietpi-obtain_hw_model
# for a full list of architecture strings.
# Example: ARCHITECTURE="raspberry,x86"
ARCHITECTURE=false

# CUSTOM_LOGLEVELS: If true, the Plugin Management Widget shows a loglevel
# selector for this plugin. Requires using LoxBerry::Log (Perl) or
# LoxBerry\Log (PHP) with user-defined loglevels in your plugin code.
# See: https://wiki.loxberry.de for LoxBerry::Log documentation.
CUSTOM_LOGLEVELS=false

# INTERFACE: The Plugin Interface version this plugin was developed for.
# Set to 2.0 if using the features described in the current developer docs.
# Do not change this unless you know exactly what you are doing.
INTERFACE=2.0
